    <div class="main-wrapper">
        <header class="top-bar">
            <div class="top-bar-left"><div class="live-badge"><span class="live-dot"></span>LIVE SYSTEM ACTIVE</div></div>
            <div class="top-bar-right">
                <div class="queue-filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="critical">Critical</button>
                    <button class="filter-btn" data-filter="high">High</button>
                    <button class="filter-btn" data-filter="moderate">Moderate</button>
                    <button class="filter-btn" data-filter="low">Low</button>
                </div>
                <a href="emergency-intake.html" class="new-intake-btn">+ New Intake</a>
            </div>
        </header>
        <div class="page-content">
            <div class="page-title-row">
                <h1 class="page-title">Live Triage Queue</h1>
                <span class="live-count">52 Active Cases</span>
            </div>
            <div class="panel full-queue-panel">
                <table class="full-queue-table" id="fullQueueTable">
                    <thead>
                        <tr>
                            <th>Priority</th>
                            <th>Patient / Case</th>
                            <th>ID</th>
                            <th>Time In</th>
                            <th>Vitals</th>
                            <th>Location</th>
                            <th>Assigned Team</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="fullQueueBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="live-queue.js"></script>
